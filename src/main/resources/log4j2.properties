status = warn
name = AkkaLog4j2Config

# Console appender
appender.console.type = Console
appender.console.name = ConsoleAppender
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{HH:mm:ss.SSS} [%t] %-5level %logger - %msg%n

# Root logger
rootLogger.level = info
rootLogger.appenderRefs = console
rootLogger.appenderRef.console.ref = ConsoleAppender

# Akka logger (very important)
logger.akka.name = akka
logger.akka.level = debug
logger.akka.additivity = false
logger.akka.appenderRefs = console
logger.akka.appenderRef.console.ref = ConsoleAppender